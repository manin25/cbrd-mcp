name: cbrd-mcp
services:
  - name: cbrd-mcp
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30
    envs:
      - key: CBRD_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CBRD_CDP_URL
        scope: RUN_TIME
        value: "http://127.0.0.1:9222"
      - key: PORT
        scope: RUN_TIME
        value: "8080"
